<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/estilo_index.css">
    <title>Mi Carrito - La Madre Del Caos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <style>
        /* AJUSTE DE ESPACIO OPTIMIZADO */
        .seccion-carrito {
            padding-top: 100px; /* Reducido de 150px para evitar el hueco excesivo */
            padding-bottom: 40px;
            color: white;
            max-width: 1000px;
            margin: 0 auto;
            min-height: 65vh;
            padding-left: 15px;
            padding-right: 15px;
        }
        
        .subitulo-carrito {
            color: #eaef58; 
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            margin-bottom: 25px;
            text-align: center;
        }

        .tabla-carrito { 
            width: 100%; 
            border-collapse: collapse; 
            background: rgba(255, 255, 255, 0.05); 
            border-radius: 8px;
            overflow: hidden;
        }

        .tabla-carrito th, .tabla-carrito td { 
            padding: 15px; 
            text-align: left; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
        }

        .tabla-carrito th { 
            color: #eaef58; 
            font-family: 'Bebas Neue'; 
            font-size: 1.4rem; 
            letter-spacing: 1px;
        }

        .btn-pagar { 
            background: #eaef58; 
            color: black; 
            padding: 12px 25px; 
            font-family: 'Bebas Neue'; 
            border: none; 
            cursor: pointer; 
            font-size: 1.2rem;
            transition: 0.3s;
        }

        .btn-pagar:hover { background: white; }

        .btn-eliminar { 
            color: #ff4d4d; 
            background: none; 
            border: none; 
            cursor: pointer; 
            font-size: 1.1rem;
        }
    </style>
</head>

<body>
    <header class="encabezado" style="min-height: auto;">
        <nav class="navegacion">
            <div class="navegacion__barra">
                <a href="index.html" class="navegacion__logotipo">
                    <img src="Imágenes/Isotipo.png" alt="Logo" class="navegacion__logo-img">
                </a>
                <button class="navegacion__boton" id="btn-menu">
                    <i class="fa-solid fa-bars" id="icono-interfaz"></i>
                </button>
                <ul class="navegacion__menu" id="menu-desplegable">
                    <li class="navegacion__item"><a href="index.html" class="navegacion__enlace">Inicio</a></li>
                    <li class="navegacion__item"><a href="menu.html" class="navegacion__enlace">Menú</a></li>
                    <li class="navegacion__item"><a href="ofertas.html" class="navegacion__enlace">Ofertas</a></li>
                    <li class="navegacion__item"><a href="eventos.html" class="navegacion__enlace">Eventos</a></li>
                    <li class="navegacion__item"><a href="ConsultarBarriles.html" class="navegacion__enlace">Barriles</a></li>
                    <li class="navegacion__item">
                        <a href="iniciar_sesion.html" class="navegacion__enlace navegacion__enlace--inicio">Iniciar Sesión</a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="seccion-carrito">
        <h2 class="subitulo-carrito">TU SELECCIÓN DE SABOR</h2>
        
        <div id="contenedor-carrito-vacio" style="display: none; text-align: center; padding: 40px;">
            <p style="font-size: 1.2rem; margin-bottom: 20px;">Tu carrito está vacío.</p>
            <a href="menu.html" class="btn-pagar" style="display: inline-block; text-decoration: none;">IR AL MENÚ</a>
        </div>

        <div id="tabla-contenedor">
            <table class="tabla-carrito">
                <thead>
                    <tr>
                        <th>PRODUCTO</th>
                        <th>PRECIO</th>
                        <th>CANT.</th>
                        <th>SUBTOTAL</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="lista-carrito">
                    </tbody>
            </table>
            
            <div style="text-align: right; margin-top: 30px;">
                <h3 style="font-family: 'Bebas Neue'; font-size: 2.2rem; color: white;">
                    TOTAL: <span id="total-precio" style="color: #eaef58;">$0.00</span>
                </h3>
                <br>
                <button class="btn-pagar" id="btn-finalizar-compra">FINALIZAR PEDIDO</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer__container">
            <div class="footer__info">
                <h3 class="footer__brand">La madre del caos</h3>
                <p class="footer__text">Golondrinas #116 Nezahualcóyotl</p>
                <p class="footer__text">Teléfono: 341 439 4591</p>
            </div>
            <div class="footer__rights">
                <p class="footer__rights-text">Todos los derechos reservados ©BitBang</p>
            </div>
        </div>
    </footer>

    <script src="js/menu.js"></script>
    <script type="module" src="api/js/MenuDinamico.js"></script>
    <script type="module" src="js/carrito_logica.js"></script>
</body>
</html>
