<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Madre Del Caos - Iniciar Sesión</title>
    <script src="api/js/lib/manejaErrores.js"></script>
    <link rel="stylesheet" href="CSS/estilo_iniciarsesion.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Open+Sans:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="encabezado">
        <a href="index.html">
            <img src="Imágenes/Isotipo.png" alt="Logo La Madre Del Caos">
        </a>
    </header>
    <from id="formulario">
    <div class="contenedor">
        <form id="formulario-login" class="login-form">
            <h2>Iniciar sesión</h2>
            <div class="input-group">
                <input id="correo" type="email" name="email" placeholder="Correo electrónico" required>
            </div>
            <div class="input-group">
                <input id="contrasena" type="password" name="password" placeholder="Contraseña" required>
            </div>
            <button type="submit">Iniciar sesión</button>
            <h3>¿No tienes cuenta? <a href="crear_cuenta.html">Crear cuenta</a></h3>          
        </form>
    </div>

    <footer class="footer">
        <div class="footer__container">
            <div class="footer__info">
                <h3 class="footer__brand">La madre del caos</h3>
                <p class="footer__text">Golondrinas #116 Nezahualcóyotl</p>
                <p class="footer__text">Teléfono: 341 439 4591</p>

                <div class="footer__icons">
                    <a href="#" class="footer_icon" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
                    <a href="#" class="footer_icon" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
                    <a href="#" class="footer_icon" target="_blank"><i class="fa-brands fa-facebook"></i></a>
                    <a href="#" class="footer_icon" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                </div>
            </div>

            <div class="footer__rights">
                <p class="footer__rights-text">Todos los derechos reservados ©BitBang</p>
                <p class="footer__rights-text">Desarrollado por Axel Salgado</p>
            </div>
        </div>
    </footer>
    </footer>
     <script type="module">
  import { consume } from "./js/lib/consume.js"
  import { enviaFormRecibeJson } from "./js/lib/enviaFormRecibeJson.js"
  formulario.addEventListener("submit", submit)
  /**
   * @param {Event} event
   */
  async function submit(event) {
   event.preventDefault()
   const respuesta = await consume(
    enviaFormRecibeJson(
     "php/valida.php", formulario))
   const json =
    await respuesta.json()
   alert(json)
  }
 </script>
</body> 
</html>
