<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Entregas - La Madre Del Caos</title>
    <link rel="stylesheet" href="CSS/Estilo_mispedidos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Open+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* Estilos adicionales para los estados */
        .boton-aceptar { background: #EAF158; color: black; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .boton-entregar { background: #28a745; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        .pedido-card { border-left: 5px solid #EAF158; margin-bottom: 20px; transition: transform 0.2s; }
        .pedido-card:hover { transform: scale(1.01); }
        .referencia-texto { font-style: italic; color: #aaa; font-size: 0.9em; }
        .badge-estado { background: #444; padding: 4px 8px; border-radius: 4px; font-size: 0.8em; }
    </style>
</head>
<body>

    <header class="encabezado">
        <nav class="navegacion">
            <div class="navegacion__barra">
                <a href="index_sesion.html" class="navegacion__logotipo">
                    <img src="Imágenes/Isotipo.png" alt="Logo" class="navegacion__logo-img">
                </a>
                <button class="navegacion__boton" id="btn-menu">
                    <i class="fa-solid fa-bars" id="icono-interfaz"></i>
                </button>
                <ul class="navegacion__menu" id="menu-desplegable">
                    <li class="navegacion__item"><a href="vista_repartidor.html" class="navegacion__enlace">Inicio</a></li>
                    <li class="navegacion__item"><a href="mispedidosrepartidor.html" class="navegacion__enlace">Pedidos Disponibles</a></li>
                    <li class="navegacion__item"><a href="perfilRepartidor.html" class="navegacion__enlace">Perfil</a></li>
                    <li><a href="iniciar_sesion.html" class="navegacion__enlace navegacion__enlace--inicio">Cerrar Sesión</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="pedidos-container">
        <div class="titulo-seccion">
            <h2 class="subitulo"><i class="fas fa-bullhorn"></i> Pedidos Disponibles</h2>
            <p class="subitulo3">Pedidos pendientes de repartidor.</p>
        </div>
        <div class="lista-pedidos" id="lista-disponibles">
            </div>

        <hr style="border: 1px solid #333; margin: 40px 0;">

        <div class="titulo-seccion">
            <h2 class="subitulo"><i class="fas fa-motorcycle"></i> Mi Entrega Actual</h2>
            <p class="subitulo3">Pedido que aceptaste y está en camino.</p>
        </div>
        <div class="lista-pedidos" id="mi-entrega-activa">
            </div>
    </main>

    <div class="mensaje" id="mensaje">Operación realizada con éxito</div>

    <script>
    // Prioridad: 1. LocalStorage, 2. Un ID de prueba (ej: 1)
    const idRepartidorActual = localStorage.getItem("id_trabajador") || 1; 

    document.addEventListener("DOMContentLoaded", () => {
        cargarPedidos();
        
        // Lógica del menú móvil
        const btnMenu = document.getElementById('btn-menu');
        const menu = document.getElementById('menu-desplegable');
        const icono = document.getElementById('icono-interfaz');
        
        btnMenu.addEventListener('click', () => {
            menu.classList.toggle('navegacion__menu--activo');
            if(icono) {
                icono.classList.toggle('fa-xmark');
                icono.classList.toggle('fa-bars');
            }
        });
    });

    function cargarPedidos() {
        // Añadimos un timestamp para evitar caché del navegador
        fetch(`api/php/get_pedidos_repartidor.php?id_rep=${idRepartidorActual}&t=${Date.now()}`)
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    renderizarDisponibles(data.disponibles);
                    renderizarMiEntrega(data.mi_entrega);
                } else {
                    console.error("Error del servidor:", data.message);
                }
            })
            .catch(err => {
                console.error("Error de red o JSON inválido. Revisa la consola de PHP.");
            });
    }

    function renderizarDisponibles(pedidos) {
        const container = document.getElementById("lista-disponibles");
        if(!container) return;

        container.innerHTML = pedidos.length === 0 
            ? '<p class="subitulo3">No hay pedidos pendientes de asignación.</p>' 
            : "";

        pedidos.forEach(p => {
            const card = `
                <div class="pedido-card">
                    <div class="pedido-header">
                        <div class="pedido-info">
                            <h3 class="galeria__texto">Pedido #${p.id_pedidos}</h3>
                            <span class="fecha">${p.fecha}</span>
                        </div>
                        <div class="estado en-proceso"><i class="fas fa-clock"></i> Pendiente</div>
                    </div>
                    <div class="pedido-items">
                        <p><strong>Cliente:</strong> ${p.cliente_nombre}</p>
                        <p><strong>Ubicación:</strong> ${p.calle} #${p.num_ext}, Col. ${p.colonia}</p>
                        <p class="referencia-texto">Ref: ${p.referencias}</p>
                    </div>
                    <div class="pedido-total">Total: $${p.monto}</div>
                    <div class="pedido-acciones">
                        <button class="boton-entregar" style="background:#EAF158; color:black;" 
                                onclick="gestionarPedido(${p.id_pedidos}, 'aceptar')">
                            <i class="fas fa-motorcycle"></i> Aceptar este pedido
                        </button>
                    </div>
                </div>`;
            container.innerHTML += card;
        });
    }

    function renderizarMiEntrega(pedidos) {
        const container = document.getElementById("mi-entrega-activa");
        if(!container) return;

        container.innerHTML = pedidos.length === 0 
            ? '<p class="subitulo3">No tienes pedidos en curso.</p>' 
            : "";

        pedidos.forEach(p => {
            const card = `
                <div class="pedido-card" style="border-color: #28a745;">
                    <div class="pedido-header">
                        <div class="pedido-info">
                            <h3 class="galeria__texto">Pedido #${p.id_pedidos}</h3>
                            <span class="fecha">TEL: ${p.telefono}</span>
                        </div>
                        <div class="estado" style="background:#28a745;"><i class="fas fa-truck"></i> En camino</div>
                    </div>
                    <div class="pedido-items">
                        <p><strong>Cliente:</strong> ${p.cliente_nombre}</p>
                        <p><strong>Dirección:</strong> ${p.calle} #${p.num_ext}, ${p.colonia}</p>
                    </div>
                    <div class="pedido-total">Total: $${p.monto}</div>
                    <div class="pedido-acciones">
                        <button class="boton-entregar" onclick="gestionarPedido(${p.id_pedidos}, 'entregar')">
                            <i class="fas fa-check"></i> Confirmar Entrega
                        </button>
                    </div>
                </div>`;
            container.innerHTML += card;
        });
    }

    function gestionarPedido(idPedido, accion) {
        const fd = new FormData();
        fd.append("id_pedido", idPedido);
        fd.append("id_repartidor", idRepartidorActual);
        fd.append("accion", accion);

        fetch("api/php/actualizar_pedido.php", {
            method: "POST",
            body: fd
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === "success") {
                mostrarMensaje(accion === "aceptar" ? "¡Pedido asignado!" : "¡Pedido entregado!");
                cargarPedidos();
            }
        });
    }

    function mostrarMensaje(texto) {
        const msg = document.getElementById("mensaje");
        msg.textContent = texto;
        msg.style.display = "block";
        setTimeout(() => { msg.style.display = "none"; }, 2500);
    }
</script>
</body>
</html>
