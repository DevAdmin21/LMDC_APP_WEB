<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - La Madre Del Caos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

    <style>
        :root {
            --blanco: #FFFFFF;
            --negro: #000000;
            --amarillo-lima: rgb(234, 241, 88);
            --rojo-oscuro: #821717;
            --gris-borde: #e1e1e1;
            --titulo: 'Bebas Neue';
            --texto: 'Open Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--texto);
            background: var(--negro);
            color: var(--blanco);
            overflow-x: hidden;
        }
        a{
            color: white;
        }

        /* --- NAVEGACIÓN --- */
        .navegacion {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
        }

        .navegacion__barra {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            max-width: 1400px;
            margin: auto;
            height: 80px;
        }

        .navegacion__logo-img {
            height: 50px;
            filter: brightness(0) invert(1);
        }

        .navegacion__boton {
            background: none;
            border: none;
            color: var(--blanco);
            font-size: 1.8rem;
            cursor: pointer;
            display: none;
        }

        .navegacion__menu {
            display: flex;
            align-items: center;
            list-style: none;
            gap: 2rem;
        }

        .navegacion__enlace {
            color: var(--blanco);
            text-decoration: none;
            font-family: var(--titulo);
            font-size: 1.2rem;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .navegacion__enlace:hover { color: var(--amarillo-lima); }

        .navegacion__enlace--inicio {
            border: 1px solid var(--amarillo-lima);
            padding: 8px 20px;
            color: var(--amarillo-lima) !important;
        }

        /* --- CONTENIDO PERFIL --- */
        .usuario-container {
            padding: 120px 5% 60px 5%;
            background-color: var(--blanco);
            color: var(--negro);
            min-height: 85vh;
        }

        .bienvenida {
            text-align: center;
            margin-bottom: 3rem;
        }

        .perfil-icono-contenedor {
            width: 150px;
            height: 150px;
            background-color: var(--negro);
            color: var(--amarillo-lima);
            border-radius: 50%;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .subitulo {
            font-family: var(--titulo);
            font-size: clamp(30px, 5vw, 50px);
            color: var(--negro);
            line-height: 1.1;
        }

        .info-contacto-rapida {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            color: #555;
            font-weight: 600;
        }

        .info-contacto-rapida i {
            color: var(--rojo-oscuro);
            margin-right: 5px;
        }

        /* --- CARDS --- */
        .menu-opciones {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .opcion-card {
            background: #fff;
            border: 1px solid var(--gris-borde);
            border-radius: 15px;
            padding: 35px 25px;
            text-align: center;
            transition: 0.3s ease;
        }

        .opcion-card:hover {
            transform: translateY(-8px);
            border-color: var(--amarillo-lima);
        }

        .opcion-card i {
            font-size: 3rem;
            color: var(--rojo-oscuro);
            margin-bottom: 15px;
        }

        .galeria__texto { font-family: var(--titulo); font-size: 2rem; margin-bottom: 10px; }

        .btn-opcion {
            display: inline-block;
            background: var(--negro);
            color: var(--blanco);
            text-decoration: none;
            padding: 12px;
            font-family: var(--titulo);
            font-size: 1.1rem;
            border-radius: 5px;
            width: 100%;
        }

        /* --- FOOTER --- */
        .footer {
            background-color: var(--negro);
            color: var(--blanco);
            padding: 3rem 5% 2rem 5%;
        }

        .footer__container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .footer__brand { font-family: var(--titulo); font-size: 2rem; color: var(--amarillo-lima); }

        @media (max-width: 950px) {
            .navegacion__boton { display: block; }
            .navegacion__menu {
                position: fixed;
                top: 0;
                left: 100%;
                width: 100%;
                height: 100vh;
                background: var(--negro);
                flex-direction: column;
                justify-content: center;
            }
            .navegacion__menu--activo { left: 0; }
        }
    </style>
</head>

<body>
    <header class="encabezado">
        <nav class="navegacion">
            <div class="navegacion__barra">
                <a href="index_sesion.html" class="navegacion__logotipo">
                    <img src="Imágenes/Isotipo.png" alt="Logo" class="navegacion__logo-img">
                </a>
                <button class="navegacion__boton" id="btn-menu">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <ul class="navegacion__menu" id="menu-desplegable">
                    <li><a href="index_sesion.html" class="navegacion__enlace">Inicio</a></li>
                    <li><a href="menu_sesion.html" class="navegacion__enlace">Menú</a></li>
                    <li><a href="ConsultarBarriles.html" class="navegacion__enlace">Barriles</a></li>
                    <li><a href="api/php/logout.php" class="navegacion__enlace navegacion__enlace--inicio">Cerrar Sesión</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="usuario-container">
        <div class="bienvenida">
            <div class="perfil-icono-contenedor">
                <svg xmlns="http://www.w3.org/2000/svg" width="70" height="70" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
                    <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1z"/>
                </svg>
            </div>
            <h2 class="subitulo" id="cliente-nombre">CARGANDO...</h2>
            
            <div class="info-contacto-rapida">
                <span><i class="fa-solid fa-envelope"></i> <span id="info-correo">---</span></span>
                <span><i class="fa-solid fa-phone"></i> <span id="info-telefono">---</span></span>
            </div>
        </div>

        <div class="menu-opciones">
            <div class="opcion-card">
                <i class="fas fa-shopping-cart"></i>
                <h3 class="galeria__texto">Hacer Pedido</h3>
                <a href="menu.html" class="btn-opcion">Ir al Menú</a>
            </div>
            <!-- <div class="opcion-card">
                <i class="fas fa-receipt"></i>
                <h3 class="galeria__texto">Mis Pedidos</h3>
                <a href="mispedidos.html" class="btn-opcion">Ver Historial</a>
            </div>
            <div class="opcion-card">
                <i class="fas fa-user-cog"></i>
                <h3 class="galeria__texto">Mi Perfil</h3>
                <a href="Editar_Perfil.html" class="btn-opcion">Editar Datos</a>
            </div> -->
        </div>
    </main>

    <footer class="footer">
    <div class="footer__container">
        <div class="footer__info">
            <h3 class="footer__brand">La madre del caos</h3>
            <p class="footer__text">Golondrinas #116 Nezahualcóyotl</p>
            <p class="footer__text">Teléfono: 341 439 4591</p>
            
            <div class="footer__icons">
                <a href="#" class="footer_icon" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
                <a href="#" class="footer_icon" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
                <a href="#" class="footer_icon" target="_blank"><i class="fa-brands fa-facebook"></i></a>
                <a href="#" class="footer_icon" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>

        <div class="footer__rights">
            <p class="footer__rights-text">Todos los derechos reservados ©BitBang</p>
        </div>
    </div>
</footer>

    <script src="js/menu.js"></script>
    <script>
        // Lógica para obtener datos usando tu API PHP
        document.addEventListener("DOMContentLoaded", () => {
            fetch('api/php/consultar_perfil.php')
                .then(res => res.json())
                .then(usuario => {
                    if (usuario.error) {
                        console.error(usuario.error);
                        return;
                    }
                    const nombreComp = `${usuario.nombre} ${usuario.apellido_p} ${usuario.apellido_m || ''}`;
                    document.getElementById("cliente-nombre").textContent = `¡BIENVENIDO/A ${nombreComp.toUpperCase()}!`;
                    document.getElementById("info-correo").textContent = usuario.correo;
                    document.getElementById("info-telefono").textContent = usuario.telefono || "No registrado";
                })
                .catch(err => console.error("Error al cargar perfil:", err));

            // Toggle móvil
            const btn = document.getElementById('btn-menu');
            const menu = document.getElementById('menu-desplegable');
            btn?.addEventListener('click', () => menu.classList.toggle('navegacion__menu--activo'));
        });
    </script>
</body>
</html>
